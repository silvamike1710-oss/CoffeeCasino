<!DOCTYPE html>
<html>
<head>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- App container -->
    <div id="app">

        <!-- Floating notifications -->
        <div id="toast"></div>

        <!-- Window title bar -->
        <div class="title-bar">
            <div class="title-bar-left">
                <span class="title-icon">🎰</span>
                <span>CoffeeCasino v1.2</span>
            </div>

            <div>
                <span class="title-btn">_</span>
                <span class="title-btn">X</span>
            </div>
        </div>

        <!-- ==========================
             LOBBY SCREEN
        =========================== -->
        <div id="lobby">

            <div class="lobby-header">
                <div class="lobby-title">CASINO</div>
                <div class="lobby-subtitle">
                    HAVE A SIP OF GAMBLING v1.2
                </div>
            </div>

            <hr class="lobby-divider">

            <!-- Game Selection -->
            <div class="lobby-section-title">
                SELECT GAME
            </div>

            <div class="games-grid">

                <!-- Slots -->
                <div
                    class="game-card"
                    onclick="location.href='games/slots/index.html'"
                >
                    <span class="game-icon">🎰</span>
                    <div class="game-name">SLOTS</div>
                    <div class="game-badge">PLAY</div>
                </div>

                <!-- Future Games -->

                <div class="game-card"
                    class="game-card"
                    onclick="location.href='games/blackjack/index.html'"
                >
                    <span class="game-icon">🃏</span>
                    <div class="game-name">BLACKJACK</div>
                    <div class="game-badge">PLAY</div>
                </div>

                <div class="game-card disabled">
                    <span class="game-icon">🎡</span>
                    <div class="game-name">ROULETTE</div>
                    <div class="game-badge soon">SOON</div>
                </div>

                <div class="game-card disabled">
                    <span class="game-icon">♠️</span>
                    <div class="game-name">POKER</div>
                    <div class="game-badge soon">SOON</div>
                </div>

            </div>

            <hr class="lobby-divider">

            <!-- ==========================
                 CASHIER
            =========================== -->

            <div class="lobby-section-title">
                CASHIER
            </div>

            <div class="cashier-window">

                <!-- Current money -->
                <div class="cashier-row">
                    <span class="cashier-label">
                        WALLET:
                    </span>

                    <span style="color:#000;font-size:18px;">
                        $<span id="cashier-money-display">0</span>
                    </span>
                </div>

                <!-- Buy chips -->
                <div class="cashier-row">
                    <span class="cashier-label">
                        BUY:
                    </span>

                    <select
                        id="chip-package"
                        class="cashier-select"
                    >
                        <option value="10">
                            10 chips = $5
                        </option>

                        <option value="25">
                            25 chips = $10
                        </option>

                        <option value="50">
                            50 chips = $20
                        </option>

                        <option value="100">
                            100 chips = $35
                        </option>
                    </select>
                </div>

                <button
                    class="cashier-btn"
                    onclick="buyChips()"
                >
                    EXCHANGE
                </button>

                <hr
                    class="lobby-divider"
                    style="margin:6px 0;"
                >

                <!-- Cash out -->
                <div
                    class="cashier-row"
                    style="margin-bottom:0;"
                >
                    <span
                        class="cashier-label"
                        style="font-size:15px;"
                    >
                        CASH OUT:
                    </span>

                    <button
                        class="cashier-btn"
                        style="flex:1"
                        onclick="cashOut()"
                    >
                        SELL ALL CHIPS
                    </button>
                </div>

            </div>

        </div>

        <!-- Status bar -->
        <div id="status-bar">
            <div class="status-item">
                💵 MONEY:
                <div class="status-value">
                    $<span id="money-display">100</span>
                </div>
            </div>

            <div class="status-item">
                CHIPS:
                <div class="status-value">
                    <span id="chips-display">0</span>
                </div>
            </div>
        </div>

    </div>

<script src="js/state.js"></script>
<script src="js/storage.js"></script>
<script src="js/ui.js"></script>
<script src="js/lobby.js"></script>
<script>
loadState();
updateUI();
</script>
</body>
</html>
