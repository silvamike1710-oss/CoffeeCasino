<!DOCTYPE html>
<html>
<head>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">

    <!-- Title bar -->
    <div class="title-bar">
        <div class="title-bar-left">
            <span class="title-icon">🎰</span>
            <span>Slot Machine</span>
        </div>

        <div>
            <span class="title-btn">_</span>
            <span class="title-btn">X</span>
        </div>
    </div>

    <!-- ==========================
         SLOT MACHINE
    =========================== -->

    <div id="slots">

        <!-- Return to lobby -->
        <div
            style="
            background:#c0c0c0;
            padding:4px 8px;
            border-bottom:2px solid #808080;
            display:flex;
            align-items:center;
            gap:8px;"
        >
            <button
                class="back-btn"
                onclick="location.href='../../index.html'"
            >
                ◀ LOBBY
            </button>

            <span
                style="
                color:#000;
                font-size:15px;
                letter-spacing:1px;"
            >
                SLOT MACHINE
            </span>
        </div>

        <div class="slots-body">

            <div class="machine-label">
                ★ GOOD LUCK ★
            </div>

            <!-- Reels -->
            <div
                class="reels-window"
                id="reels-window"
            >

                <div class="reel" id="reel-0">
                    <div
                        class="reel-symbol"
                        id="sym-0"
                    >
                        🍒
                    </div>
                </div>

                <div class="reel" id="reel-1">
                    <div
                        class="reel-symbol"
                        id="sym-1"
                    >
                        🍒
                    </div>
                </div>

                <div class="reel" id="reel-2">
                    <div
                        class="reel-symbol"
                        id="sym-2"
                    >
                        🍒
                    </div>
                </div>

                <div class="payline"></div>

            </div>

            <div
                class="result-msg"
                id="result-msg"
            >
                INSERT CHIPS TO PLAY
            </div>

            <!-- Betting controls -->
            <div class="bet-section">

                <div class="bet-row">

                    <span class="bet-label">
                        BET:
                    </span>

                    <button
                        class="bet-btn"
                        onclick="changeBet(-1)"
                    >
                        -
                    </button>

                    <div
                        class="bet-display"
                        id="bet-display"
                    >
                        1
                    </div>

                    <button
                        class="bet-btn"
                        onclick="changeBet(1)"
                    >
                        +
                    </button>

                    <span
                        class="bet-label"
                        style="
                        text-align:right;
                        min-width:60px;
                        font-size:14px;"
                    >
                        CHIPS
                    </span>

                </div>

            </div>

            <!-- Spin button -->
            <button
                id="spin-btn"
                class="spin-btn"
                onclick="spin()"
                disabled
            >
                ▶SPIN◀
            </button>

        </div>

        <!-- Paytable -->

        <div class="paytable">

            <div class="paytable-title">
                — PAY TABLE —
            </div>

            <div class="paytable-row"><span>7️⃣ 7️⃣ 7️⃣</span><span>JACKPOT 50x</span></div>
            <div class="paytable-row"><span>💎 💎 💎</span><span>BIG WIN 20x</span></div>
            <div class="paytable-row"><span>🍋 🍋 🍋</span><span>WIN 10x</span></div>
            <div class="paytable-row"><span>⭐ ⭐ ⭐</span><span>WIN 8x</span></div>
            <div class="paytable-row"><span>🔔 🔔 🔔</span><span>WIN 5x</span></div>
            <div class="paytable-row"><span>🍊 🍊 🍊</span><span>WIN 4x</span></div>
            <div class="paytable-row"><span>🍇 🍇 🍇</span><span>WIN 3x</span></div>
            <div class="paytable-row"><span>🍒 🍒 🍒</span><span>WIN 2x</span></div>
            <div class="paytable-row"><span>🍒 🍒 _</span><span>WIN 1x</span></div>

        </div>

    </div>

    <!-- Shared status bar -->
    <div id="status-bar">

        <div class="status-item">
            💵 MONEY:
            <div class="status-value">
                $<span id="money-display">100</span>
            </div>
        </div>

        <div class="status-item">
            CHIPS:
            <div class="status-value">
                <span id="chips-display">0</span>
            </div>
        </div>

    </div>

</div>

<script src="../../js/state.js"></script>
<script src="../../js/storage.js"></script>
<script src="../../js/ui.js"></script>
<script src="script.js"></script>
<script>
loadState();
console.log("Loaded state:", state);
updateUI();
</script>

</body>
</html>
